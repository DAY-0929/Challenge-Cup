<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI网课学院</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

      font-family: "Helvetica Neue", Helvetica, Arial, "微软雅黑", sans-serif;
    }
    :root {
      --primary-purple: #6338f5;
      --text-dark: #111827;
      --text-gray: #6b7280;
      --bg-light: #f8fafc;
      --white: #ffffff;
      --border-radius: 999px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    html, body {
      overflow: visible !important;
      overflow-y: auto !important;
      height: auto !important;
    }

    body {
      background-color: var(--bg-light);
      color: var(--text-dark);
    }

    /* 可关闭滚动横幅 */
    .top-banner {
      position: relative;
      background-color: var(--primary-purple);
      color: white;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      overflow: hidden;
      white-space: nowrap;
    }
    .banner-close {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      z-index: 10;
    }
    .banner-text {
      display: inline-block;
      animation: scroll 15s linear infinite;
      padding-left: 100%;
    }
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* 导航 */
    header {
      padding: 16px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 999;
      background: white;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background-color: var(--primary-purple);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      text-decoration: none;
    }

    /* 右上角头像 */
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid #eee;
    }

    /* 大封面 */
    .hero {
      position: relative;
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
      overflow: visible;
    }
    .hero-bg-shape {
      position: absolute;
      z-index: -1;
    }
    .shape-pink {
      width: 420px;
      height: 420px;
      background: #ffc2d1;
      border-radius: 50%;
      top: -80px;
      left: -120px;
    }
    .shape-green {
      width: 260px;
      height: 260px;
      background: #86efac;
      top: 60px;
      right: 30%;
    }
    .shape-blue {
      width: 380px;
      height: 380px;
      background: #3b82f6;
      bottom: -120px;
      left: -80px;
      clip-path: polygon(0 0, 100% 0, 100% 100%);
    }
    .shape-yellow {
      width: 460px;
      height: 460px;
      background: #facc15;
      bottom: -180px;
      right: -100px;
      clip-path: polygon(0 0, 100% 100%, 0 100%);
    }
    .hero-title {
      font-size: 72px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 24px;
      color: var(--text-dark);
    }
    .hero-desc {
      font-size: 18px;
      color: var(--text-gray);
      max-width: 700px;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .hero-tags {
      display: flex;
      gap: 24px;
    }
    .hero-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
    }
    .hero-tag-dot {
      width: 12px;
      height: 12px;
      background-color: var(--primary-purple);
      border-radius: 50%;
    }

    /* ========== 你要的：手动点击箭头 + 卡片底部绿色方块按钮 ========== */
    .manual-slide-box {
      max-width: 1200px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }
    .slide-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 16px;
    }
    .slide-wrap {
      position: relative;
      overflow: hidden;
    }
    .slide-track {
      display: flex;
      gap: 20px;
      transition: transform 0.3s ease;
    }
    /* 单个卡片 */
    .slide-card {
      min-width: 260px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .slide-card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }
    .slide-card-info {
      padding: 12px;
    }
    .slide-card-title {
      font-weight: bold;
      margin-bottom: 10px;
    }
    .slide-card-tag {
      font-size: 10px;
      padding: 2px 6px;
      background: #eee;
      border-radius: 4px;
      margin-right: 4px;
    }
    .slide-card-discount {
      color: red;
      font-size: 10px;
    }
    /* 重点：卡片底部绿色方块按钮！不是外框！ */
    .card-green-btn {
      width: 100%;
      height: 44px;
      background: #22c55e; /*纯绿色方块*/
      border: none;
      color: white;
      margin-top: 10px;
      cursor: pointer;
    }
    /* 左右箭头按钮 手动点击切换 */
    .arrow-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: white;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer;
      z-index: 10;
    }
    .arrow-left { left: 10px; }
    .arrow-right{ right:10px; }

    /* 原有网课区域完全不动 */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 60px;
      display: flex;
      gap: 32px;
    }
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      position: sticky;
      top: 120px;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    .sidebar-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--border-radius);
      border: 1px solid #e5e7eb;
      font-size: 14px;
      margin-bottom: 24px;
      outline: none;
    }
    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-item {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 50;
      cursor: pointer;
    }
    .filter-item.active {
      background-color: var(--primary-purple);
      color: white;
    }
    .course-content {
      flex: 1;
    }
    .course-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .course-card {
      background-color: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .course-cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .course-info {
      padding: 20px;
    }
    .course-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .course-tag {
      font-size: 12px;
      color: var(--primary-purple);
      background-color: #ede9fe;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .modal-mask {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal-box {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      padding: 32px;
    }
    .modal-title {
      font-size: 22px;
      text-align: center;
      margin-bottom: 24px;
    }
    .modal-input {
      width: 100%;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .modal-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary-purple);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .modal-btn-outline {
      background: transparent;
      color: #222;
      border: 1px solid #ddd;
      margin-top: 8px;
    }

    .chat-float-btn {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 64px;
      height: 64px;
      background: var(--primary-purple);
      border-radius: 50%;
      color: white;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 998;
    }
    .chat-panel {
      position: fixed;
      bottom: 110px;
      right: 32px;
      width: 360px;
      background: white;
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: none;
      flex-direction: column;
      z-index: 998;
    }
    .chat-body {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
    }
    .chat-msg {
      max-width: 75%;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .msg-user {
      background: var(--primary-purple);
      color: white;
      align-self: flex-end;
    }
    .msg-bot {
      background: #f3f4f6;
      align-self: flex-start;
    }

    .ball {
      position: absolute;
      width: 26px;
      height: 26px;
      background: #facc15;
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
    }

    @media (max-width:768px) {
      .container {flex-direction: column;}
      .sidebar {width: 100%; position: static;}
      .course-grid {grid-template-columns: repeat(2,1fr);}
    }
  </style>
</head>
<body>

<!-- 可关闭滚动横幅 -->
<div class="top-banner" id="banner">
  <button class="banner-close" onclick="closeBanner()">×</button>
  <div class="banner-text">🎉 全部课程限时特惠 · 零基础入门AI · 支教团队 · 经典范例 · 实操反馈</div>
</div>

<!-- 导航 -->

<!-- 大封面 -->

<!-- ========== 你要的：手动点击箭头切换 + 卡片底部绿色方块按钮 ========== -->
<div class="manual-slide-box">
  <div class="slide-title">Courses + Workshops</div>

      <div class="slide-card">

</div>

<!-- 原有20节网课完全不动 -->
<div class="container" id="app">
  <aside class="sidebar">
    <div class="sidebar-title">课程分类</div>
    <input class="search-input" placeholder="搜索课程..." oninput="filterCourses()">
    <div class="filter-list">
      <div class="filter-item active" onclick="setFilter('all')">全部课程</div>
      <div class="filter-item" onclick="setFilter('data')">数据读心术</div>
      <div class="filter-item" onclick="setFilter('inter')">人机共舞术</div>
      <div class="filter-item" onclick="setFilter('ethic')">伦理守护盾</div>
      <div class="filter-item" onclick="setFilter('cross')">跨界编织者</div>
    </div>
  </aside>

  <main class="course-content">
    <div class="course-grid" id="courseGrid"></div>
  </main>
</div>

<div class="modal-mask" id="loginModal">
  <div class="modal-box">
    <h3 class="modal-title">登录</h3>
    <input class="modal-input" placeholder="用户名" id="loginUser">

    <button class="modal-btn modal-btn-outline" onclick="closeLogin()">关闭</button>
  </div>
</div>

<div class="modal-mask" id="profileModal">
  <div class="modal-box">
    <h3 class="modal-title">个人中心</h3>
    <img id="profileAvatar" src="assets/images/院徽（金）.png" style="width:80px; height:80px; border-radius:50%; margin:0 auto 16px; display:block;">
    <input type="file" accept="image/*" onchange="changeAvatar()">
    <input class="modal-input" placeholder="昵称" id="nick">
    <button class="modal-btn" onclick="saveProfile()">保存</button>
    <button class="modal-btn modal-btn-outline" onclick="closeProfile()">关闭</button>
  </div>
</div>

<div class="chat-float-btn" onclick="toggleChat()">💬</div>
<div class="chat-panel" id="chatPanel">
  <div class="chat-body" id="chatBody"></div>
  <input id="chatInput" placeholder="输入问题...">
  <button onclick="sendMsg()">发送</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
function closeBanner(){document.getElementById('banner').style.display='none'}

// ========== 手动点击箭头切换逻辑 ==========
let slideIndex = 0;
const track = document.getElementById('slideTrack');
const cardWidth = 280; //卡片宽度+间距

function nextSlide(){
  slideIndex++;
  track.style.transform = `translateX(-${slideIndex * cardWidth}px)`;
}
function prevSlide(){
  if(slideIndex>0){
    slideIndex--;
    track.style.transform = `translateX(-${slideIndex * cardWidth}px)`;
  }
}

const courses = [
  {id:1,title:"人工智能数据识别原理入门",type:"data",tag:"数据读心术",img:"assets/course/1.jpg"},
  {id:2,title:"生活数据采集与AI认知启蒙",type:"data",tag:"数据读心术",img:"assets/course/2.jpg"},
  {id:3,title:"数字信息解码与逻辑基础讲解",type:"data",tag:"数据读心术",img:"assets/course/3.jpg"},
  {id:4,title:"智能助手开发实战",type:"inter",tag:"人机共舞术",img:"assets/course/4.jpg"},
  {id:5,title:"对话系统设计",type:"inter",tag:"人机共舞术",img:"assets/course/5.jpg"},
  {id:6,title:"提示词工程大师课",type:"inter",tag:"人机共舞术",img:"assets/course/6.jpg"},
  {id:7,title:"AI伦理与安全",type:"ethic",tag:"伦理守护盾",img:"assets/course/7.jpg"},
  {id:8,title:"AIGC全栈应用",type:"cross",tag:"跨界编织者",img:"assets/course/8.jpg"},
  {id:9,title:"多模态大模型实战",type:"cross",tag:"跨界编织者",img:"assets/course/9.jpg"},
  {id:10,title:"AI商业落地项目",type:"cross",tag:"跨界编织者",img:"assets/course/10.jpg"},
  {id:11,title:"数据安全与合规",type:"ethic",tag:"伦理守护盾",img:"assets/course/11.jpg"},
  {id:12,title:"AI风控系统",type:"ethic",tag:"伦理守护盾",img:"assets/course/12.jpg"},
  {id:13,title:" 图像语音数据智能分析科普",type:"data",tag:"数据读心术",img:"assets/course/13.jpg"},
  {id:14,title:"大数据时代AI基础思维培养",type:"data",tag:"数据读心术",img:"assets/course/14.jpg"},
  {id:15,title:"前端AI组件开发",type:"inter",tag:"人机共舞术",img:"assets/course/15.jpg"},
  {id:16,title:"语音交互系统",type:"inter",tag:"人机共舞术",img:"assets/course/16.jpg"},
  {id:17,title:"AI绘画进阶",type:"cross",tag:"跨界编织者",img:"assets/course/17.jpg"},
  {id:18,title:"AI视频生成",type:"cross",tag:"跨界编织者",img:"assets/course/18.jpg"},
  {id:19,title:"乡村支教趣味AI数据通识课",type:"data",tag:"数据读心术",img:"assets/course/19.jpg"},
  {id:20,title:"AI全栈项目实战",type:"cross",tag:"跨界编织者",img:"assets/course/20.jpg"}
];

let currentFilter="all";let keyword="";
function renderCourse(){
  const grid=document.getElementById('courseGrid');
  const list=courses.filter(item=>{
    const tagOk=currentFilter==='all'||item.type===currentFilter;
    const keyOk=item.title.includes(keyword);
    return tagOk&&keyOk;
  });
  grid.innerHTML=list.map((item, index)=>`
  <div class="course-card" ${index == 0 ? 'onclick="location.href=\'index .html\'" style="cursor:pointer;"' : ''}>
    <img class="course-cover" src="${item.img}">
    <div class="course-info">
      <div class="course-title">${item.title}</div>
      <span class="course-tag">${item.tag}</span>
    </div>
  </div>
`).join('');
}
function setFilter(type){currentFilter=type;document.querySelectorAll('.filter-item').forEach(e=>e.classList.remove('active'));event.target.classList.add('active');renderCourse();}
function filterCourses(){keyword=document.querySelector('.search-input').value;renderCourse();}

function openLogin(){document.getElementById('loginModal').style.display='flex'}
function closeLogin(){document.getElementById('loginModal').style.display='none'}
function login(){localStorage.setItem('login',true);document.getElementById('app').style.display='flex';closeLogin();initBall();}

function openProfile(){document.getElementById('profileModal').style.display='flex'}
function closeProfile(){document.getElementById('profileModal').style.display='none'}
function saveProfile(){alert('保存成功');closeProfile();}

function changeAvatar(){
  const file=event.target.files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    document.querySelector('.avatar').src=e.target.result;
    document.getElementById('profileAvatar').src=e.target.result;
    localStorage.setItem('avatar',e.target.result);
  }
  reader.readAsDataURL(file);
}

function toggleChat(){const p=document.getElementById('chatPanel');p.style.display=p.style.display==='flex'?'none':'flex'}
function sendMsg(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg)return;
  document.getElementById('chatBody').innerHTML+=`<div class="chat-msg msg-user">${msg}</div>`;
  input.value='';
}

const {Engine,Bodies,Composite,Events}=Matter;
function initBall(){
  const engine=Engine.create();const world=engine.world;
  const edges=[Bodies.rectangle(innerWidth/2,-10,innerWidth,20,{isStatic:true}),Bodies.rectangle(innerWidth/2,innerHeight+10,innerWidth,20,{isStatic:true})];
  Composite.add(world,edges);
  for(let i=0;i<12;i++){
    const div=document.createElement('div');div.className='ball';div.innerText='😊';document.body.appendChild(div);
    const body=Bodies.circle(Math.random()*innerWidth,50,13,{restitution:0.8});
    Composite.add(world,body);
    Events.on(engine,'afterUpdate',()=>{div.style.left=body.position.x-13+'px';div.style.top=body.position.y-13+'px';});
  }
  Engine.run(engine);
}

window.onload=()=>{
  renderCourse();
  const av=localStorage.getItem('avatar');
  if(av)document.querySelector('.avatar').src=av;
